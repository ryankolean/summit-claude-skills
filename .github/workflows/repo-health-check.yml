name: Repo Health Check

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday at 10:00 AM ET (14:00 UTC)
  workflow_dispatch:  # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  check-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run health check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/health-check.js

      - name: Show report summary
        run: |
          echo "### Health Report Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f HEALTH-REPORT.md ]; then
            head -10 HEALTH-REPORT.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md HEALTH-REPORT.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: weekly repo health update [automated]"
          git push origin HEAD:main
