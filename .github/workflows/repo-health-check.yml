name: Repo Health Check

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday at 10:00 AM ET (14:00 UTC)
  workflow_dispatch:  # Manual trigger from Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  check-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run health check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/health-check.js

      - name: Show report summary
        run: |
          echo "### Health Report Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f HEALTH-REPORT.md ]; then
            head -10 HEALTH-REPORT.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create PR if changes detected
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: weekly repo health update [automated]"
          title: "Weekly Repo Health Update"
          body: |
            **Automated weekly health check**

            This PR was generated by the repo health check workflow.

            Changes may include:
            - Updated "Last updated" date in README
            - New or updated HEALTH-REPORT.md with current star counts
            - Warnings for archived, deleted, or inactive (60+ days) repos

            Review the HEALTH-REPORT.md diff for details, then merge.
          branch: auto/health-update
          delete-branch: true
          add-paths: |
            README.md
            HEALTH-REPORT.md
          labels: automated
